name: Mobile E2E

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/mobile-e2e.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/mobile-e2e.yml"
  workflow_dispatch:

jobs:
  mobile-e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/fitTrack/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Enable KVM
        run: |
          sudo tee /etc/udev/rules.d/99-kvm4all.rules >/dev/null <<'EOF'
          KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"
          EOF
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install frontend dependencies
        working-directory: frontend/fitTrack
        run: npm ci

      - name: Build Ionic app
        working-directory: frontend/fitTrack
        run: npm run build

      - name: Sync Capacitor Android project
        working-directory: frontend/fitTrack
        run: npx cap sync android

      # Optional but helps avoid disk issues
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          df -h

      - name: Run Appium mobile E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: google_apis
          arch: x86_64
          disk-size: 4096M
          disable-linux-hw-accel: false
          emulator-boot-timeout: 1200
          disable-animations: true
          script: bash frontend/fitTrack/e2e/appium/ci-mobile-e2e.sh

      - name: Upload Appium log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log
          path: /tmp/appium.log
