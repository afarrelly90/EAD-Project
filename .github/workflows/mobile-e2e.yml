name: Mobile E2E

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/mobile-e2e.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/mobile-e2e.yml'
  workflow_dispatch:

jobs:
  register-e2e:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/fitTrack

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/fitTrack/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Ionic app
        run: npm run build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Run Appium register E2E
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: Nexus 6
          script: |
            set -euo pipefail

            cd frontend/fitTrack/android
            ./gradlew app:installDebug
            cd ..

            WEBVIEW_VERSION="$(adb shell dumpsys package com.google.android.webview | sed -n 's/.*versionName=//p' | head -n 1 | tr -d '\r')"
            if [ -z "$WEBVIEW_VERSION" ]; then
              WEBVIEW_VERSION="$(adb shell dumpsys package com.android.chrome | sed -n 's/.*versionName=//p' | head -n 1 | tr -d '\r')"
            fi

            if [ -z "$WEBVIEW_VERSION" ]; then
              echo "Could not detect Android WebView/Chrome version"
              exit 1
            fi

            echo "Detected WebView version: $WEBVIEW_VERSION"
            export CHROME_BUILD="$(echo "$WEBVIEW_VERSION" | cut -d. -f1-3)"

            python3 - <<'PY'
            import json
            import os
            import urllib.request

            build = os.environ["CHROME_BUILD"]
            url = "https://googlechromelabs.github.io/chrome-for-testing/latest-patch-versions-per-build-with-downloads.json"
            with urllib.request.urlopen(url) as response:
                data = json.load(response)

            downloads = data.get("builds", {}).get(build, {}).get("downloads", {}).get("chromedriver", [])
            linux = next((item["url"] for item in downloads if item["platform"] == "linux64"), None)
            if not linux:
                raise SystemExit(f"No linux64 chromedriver download found for Chrome build {build}")

            with open("/tmp/chromedriver-url.txt", "w", encoding="utf-8") as handle:
                handle.write(linux)
            PY

            CHROMEDRIVER_URL="$(cat /tmp/chromedriver-url.txt)"
            echo "Downloading Chromedriver from $CHROMEDRIVER_URL"
            curl -fsSL "$CHROMEDRIVER_URL" -o /tmp/chromedriver.zip
            unzip -oq /tmp/chromedriver.zip -d /tmp/chromedriver

            CHROMEDRIVER_BIN="$(find /tmp/chromedriver -type f -name chromedriver | head -n 1)"
            if [ -z "$CHROMEDRIVER_BIN" ]; then
              echo "Chromedriver binary was not found after unzip"
              exit 1
            fi
            chmod +x "$CHROMEDRIVER_BIN"

            npx appium --port 4725 --allow-insecure chromedriver_autodownload > /tmp/appium.log 2>&1 &
            APPIUM_PID=$!

            cleanup() {
              kill "$APPIUM_PID" >/dev/null 2>&1 || true
            }
            trap cleanup EXIT

            sleep 5

            APPIUM_PORT=4725 CHROMEDRIVER_EXECUTABLE="$CHROMEDRIVER_BIN" npm run test:e2e:register

      - name: Upload Appium log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log
          path: /tmp/appium.log
