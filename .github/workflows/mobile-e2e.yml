name: Mobile E2E

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/mobile-e2e.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/mobile-e2e.yml"
  workflow_dispatch:

jobs:
  register-e2e:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/fitTrack

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/fitTrack/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Enable KVM
        run: |
          sudo tee /etc/udev/rules.d/99-kvm4all.rules >/dev/null <<'EOF'
          KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"
          EOF
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Ionic app
        run: npm run build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Run Appium register E2E
        uses: reactivecircus/android-emulator-runner@v2
        with:
          target: google_atd
          arch: x86_64
          disk-size: 4096M
          disable-linux-hw-accel: false
          emulator-boot-timeout: 1200
          disable-animations: true
          script: |
            set -euo pipefail

            echo "=== Restarting ADB ==="
            adb kill-server || true
            adb start-server
            adb wait-for-device

            echo "=== Waiting for Android boot ==="
            until adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r' | grep -q '^1$'; do
              sleep 2
            done

            # Extra stabilization (important for CI)
            sleep 10

            echo "=== Connected devices ==="
            adb devices

            echo "=== Installing app ==="
            cd android
            ./gradlew app:installDebug --stacktrace
            cd ..

            echo "=== Detecting WebView version ==="
            WEBVIEW_VERSION="$(adb shell dumpsys package com.google.android.webview | sed -n 's/.*versionName=//p' | head -n 1 | tr -d '\r')"
            if [ -z "$WEBVIEW_VERSION" ]; then
              WEBVIEW_VERSION="$(adb shell dumpsys package com.android.chrome | sed -n 's/.*versionName=//p' | head -n 1 | tr -d '\r')"
            fi

            if [ -z "$WEBVIEW_VERSION" ]; then
              echo "❌ Could not detect Android WebView/Chrome version"
              exit 1
            fi

            echo "Detected WebView version: $WEBVIEW_VERSION"
            export CHROME_BUILD="$(echo "$WEBVIEW_VERSION" | cut -d. -f1-3)"

            echo "=== Resolving Chromedriver ==="
            python3 - <<'PY'
            import json
            import os
            import urllib.request

            build = os.environ["CHROME_BUILD"]
            url = "https://googlechromelabs.github.io/chrome-for-testing/latest-patch-versions-per-build-with-downloads.json"
            with urllib.request.urlopen(url) as response:
                data = json.load(response)

            downloads = data.get("builds", {}).get(build, {}).get("downloads", {}).get("chromedriver", [])
            linux = next((item["url"] for item in downloads if item["platform"] == "linux64"), None)
            if not linux:
                raise SystemExit(f"No linux64 chromedriver found for Chrome build {build}")

            with open("/tmp/chromedriver-url.txt", "w", encoding="utf-8") as handle:
                handle.write(linux)
            PY

            CHROMEDRIVER_URL="$(cat /tmp/chromedriver-url.txt)"
            echo "Downloading Chromedriver from $CHROMEDRIVER_URL"
            curl -fsSL "$CHROMEDRIVER_URL" -o /tmp/chromedriver.zip
            unzip -oq /tmp/chromedriver.zip -d /tmp/chromedriver

            CHROMEDRIVER_BIN="$(find /tmp/chromedriver -type f -name chromedriver | head -n 1)"
            if [ -z "$CHROMEDRIVER_BIN" ]; then
              echo "❌ Chromedriver binary not found"
              exit 1
            fi
            chmod +x "$CHROMEDRIVER_BIN"

            echo "=== Starting Appium ==="
            npx appium --port 4725 --allow-insecure chromedriver_autodownload > /tmp/appium.log 2>&1 &
            APPIUM_PID=$!

            cleanup() {
              kill "$APPIUM_PID" >/dev/null 2>&1 || true
            }
            trap cleanup EXIT

            echo "=== Waiting for Appium ==="
            until curl -s http://localhost:4725/status | grep -q '"ready":true'; do
              sleep 2
            done

            echo "=== Running E2E tests ==="
            APPIUM_PORT=4725 CHROMEDRIVER_EXECUTABLE="$CHROMEDRIVER_BIN" npm run test:e2e:register

      - name: Upload Appium log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log
          path: /tmp/appium.log
